<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamFlix</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1f1f1f;
    --border: #2a2a2a; --text: #e5e5e5; --muted: #888;
    --red: #E50914; --white: #fff;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 48px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, transparent 100%);
    transition: background 0.3s;
  }
  nav.scrolled { background: rgba(10,10,10,0.98); }
  .nav-logo { font-size: 26px; font-weight: 700; color: var(--red); letter-spacing: -0.5px; cursor: pointer; }
  .nav-links { display: flex; gap: 4px; list-style: none; }
  .nav-links button {
    background: none; border: none; color: var(--muted);
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; padding: 7px 14px; border-radius: 6px; transition: all 0.2s;
  }
  .nav-links button:hover { color: var(--white); background: rgba(255,255,255,0.08); }
  .nav-links button.active { color: var(--white); background: rgba(255,255,255,0.1); }
  .search-wrap { position: relative; }
  .search-input {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; color: var(--white); font-family: 'Inter', sans-serif;
    font-size: 13px; padding: 8px 36px 8px 14px; width: 220px; outline: none;
    transition: all 0.2s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.12); width: 260px; }
  .search-icon { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; }

  .hero {
    position: relative; height: 88vh; min-height: 500px;
    display: flex; align-items: flex-end; padding: 0 48px 80px; overflow: hidden;
  }
  .hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center top; transition: background-image 0.6s; }
  .hero-bg::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to top, #0a0a0a 0%, rgba(10,10,10,0.55) 40%, rgba(10,10,10,0.1) 70%, transparent 100%),
                linear-gradient(to right, rgba(10,10,10,0.85) 0%, transparent 55%);
  }
  .hero-content { position: relative; z-index: 2; max-width: 560px; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(229,9,20,0.2); border: 1px solid rgba(229,9,20,0.45);
    border-radius: 4px; padding: 4px 10px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase; color: #ff7070; margin-bottom: 14px;
  }
  .hero-title { font-size: clamp(28px,5vw,52px); font-weight: 700; line-height: 1.08; color: var(--white); margin-bottom: 12px; text-shadow: 0 2px 12px rgba(0,0,0,0.6); }
  .hero-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 13px; color: var(--muted); }
  .hero-meta .green { color: #46d369; font-weight: 600; }
  .hero-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .hero-overview { font-size: 14px; line-height: 1.65; color: #ccc; margin-bottom: 24px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .hero-actions { display: flex; gap: 12px; }
  .btn-play {
    display: flex; align-items: center; gap: 8px;
    background: var(--white); color: #000; border: none; border-radius: 7px;
    padding: 12px 28px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-play:hover { background: rgba(255,255,255,0.85); transform: scale(1.02); }
  .btn-info {
    display: flex; align-items: center; gap: 8px;
    background: rgba(109,109,110,0.65); color: var(--white); border: none; border-radius: 7px;
    padding: 12px 24px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-info:hover { background: rgba(109,109,110,0.45); }
  .hero-dots { position: absolute; bottom: 28px; right: 48px; display: flex; gap: 6px; z-index: 3; }
  .hero-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: all 0.3s; }
  .hero-dot.active { background: var(--red); width: 22px; border-radius: 3px; }

  main { padding-top: 16px; }
  .section { margin-bottom: 36px; }
  .section-title { font-size: 18px; font-weight: 700; color: var(--white); padding: 0 48px; margin-bottom: 12px; }
  .row-wrap { position: relative; }
  .row { display: flex; gap: 8px; padding: 8px 48px 12px; overflow-x: auto; scroll-behavior: smooth; scrollbar-width: none; }
  .row::-webkit-scrollbar { display: none; }
  .row-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.1);
    color: var(--white); width: 40px; height: 72px; border-radius: 5px;
    font-size: 22px; cursor: pointer; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s, background 0.2s;
  }
  .row-wrap:hover .row-arrow { opacity: 1; }
  .row-arrow:hover { background: rgba(20,20,20,0.95); }
  .row-arrow.left { left: 4px; }
  .row-arrow.right { right: 4px; }

  .card { flex: 0 0 175px; border-radius: 7px; overflow: hidden; cursor: pointer; position: relative; background: var(--surface2); transition: transform 0.25s, box-shadow 0.25s; }
  .card:hover { transform: scale(1.09); z-index: 5; box-shadow: 0 10px 36px rgba(0,0,0,0.85); }
  .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
  .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%); padding: 32px 10px 10px; opacity: 0; transition: opacity 0.25s; }
  .card:hover .card-overlay { opacity: 1; }
  .card-title { font-size: 12px; font-weight: 600; color: var(--white); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-rating { font-size: 11px; color: #46d369; font-weight: 600; }
  .card-play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); background: rgba(255,255,255,0.92); color: #000; border: none; border-radius: 50%; width: 46px; height: 46px; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; padding-left: 3px; }
  .card:hover .card-play { transform: translate(-50%,-50%) scale(1); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: #181818; border-radius: 12px; width: 100%; max-width: 860px; max-height: 90vh; overflow-y: auto; position: relative; transform: scale(0.95); transition: transform 0.3s; scrollbar-width: thin; scrollbar-color: #444 transparent; }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-close { position: absolute; top: 14px; right: 14px; background: rgba(20,20,20,0.9); border: 1px solid rgba(255,255,255,0.15); color: var(--white); width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .modal-close:hover { background: #333; }
  .modal-video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px 12px 0 0; overflow: hidden; }
  .modal-video iframe { width: 100%; height: 100%; border: none; display: block; }
  .modal-video .no-trailer { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 12px; font-size: 14px; }
  .modal-video .no-trailer .icon { font-size: 44px; opacity: 0.35; }
  .modal-body { padding: 28px 32px 36px; }
  .modal-title { font-size: 24px; font-weight: 700; color: var(--white); margin-bottom: 10px; line-height: 1.2; }
  .modal-meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: 13px; margin-bottom: 16px; align-items: center; }
  .modal-meta .green { color: #46d369; font-weight: 600; }
  .modal-meta .pill { background: rgba(255,255,255,0.1); border-radius: 5px; padding: 3px 9px; color: var(--muted); }
  .modal-overview { font-size: 14px; line-height: 1.7; color: #ccc; margin-bottom: 18px; }
  .modal-genres { display: flex; flex-wrap: wrap; gap: 7px; }
  .genre-tag { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 4px 13px; font-size: 12px; color: var(--muted); }

  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 48px; margin-bottom: 8px; }
  .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; padding: 10px 18px 10px 0; cursor: pointer; margin-bottom: -1px; transition: color 0.2s, border-color 0.2s; }
  .tab-btn.active { color: var(--white); border-bottom-color: var(--red); }
  .tab-btn:hover { color: var(--white); }

  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--muted); font-size: 14px; gap: 12px; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg { color: #ff6b6b; padding: 40px 48px; font-size: 14px; line-height: 1.6; }

  .search-section { display: none; }
  .search-section.visible { display: block; }
  .browse-section.hidden { display: none; }
  .search-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 16px 48px; }
  .search-grid .card { flex: none; width: 100%; }
  .no-results { color: var(--muted); padding: 40px 48px; font-size: 14px; }

  @media (max-width: 768px) {
    nav { padding: 12px 16px; }
    .nav-links { display: none; }
    .hero { padding: 0 16px 56px; height: 75vh; }
    .hero-dots { right: 16px; }
    .section-title, .tabs { padding: 0 16px; }
    .row { padding: 8px 16px 12px; }
    .card { flex: 0 0 130px; }
    .search-grid { padding: 12px 16px; }
    .search-input { width: 160px; }
    .search-input:focus { width: 190px; }
    .modal-body { padding: 16px 18px 24px; }
  }
</style>
</head>
<body>

<nav id="nav">
  <div class="nav-logo">STREAMFLIX</div>
  <ul class="nav-links">
    <li><button class="nav-tab active" data-type="all">Home</button></li>
    <li><button class="nav-tab" data-type="movie">Movies</button></li>
    <li><button class="nav-tab" data-type="tv">TV Shows</button></li>
  </ul>
  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="Search...">
    <span class="search-icon">⌕</span>
  </div>
</nav>

<div class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-content" id="heroContent"><div class="loading"><div class="spinner"></div> Loading...</div></div>
  <div class="hero-dots" id="heroDots"></div>
</div>

<main>
  <div class="browse-section" id="browseSection">
    <div class="tabs">
      <button class="tab-btn active" data-type="all">All</button>
      <button class="tab-btn" data-type="movie">Movies</button>
      <button class="tab-btn" data-type="tv">TV Shows</button>
    </div>
    <div id="sections"><div class="loading"><div class="spinner"></div> Loading content...</div></div>
  </div>
  <div class="search-section" id="searchSection">
    <div class="section-title" id="searchTitle" style="padding-top:16px">Search Results</div>
    <div class="search-grid" id="searchGrid"></div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-video" id="modalVideo"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const API_KEY = '9972547cc7fe2fc714f037bbe51e50b7';
const BASE    = 'https://api.themoviedb.org/3';
const IMG     = 'https://image.tmdb.org/t/p/';

let currentType = 'all';
let heroItems = [], heroIdx = 0, heroTimer = null;
let searchTimer = null;

// ── CORE FETCH (simple GET, no custom headers → no CORS preflight) ──
async function api(path, params = {}) {
  const u = new URL(BASE + path);
  u.searchParams.set('api_key', API_KEY);
  u.searchParams.set('language', 'en-US');
  Object.entries(params).forEach(([k, v]) => u.searchParams.set(k, v));
  const r = await fetch(u.toString());
  if (!r.ok) throw new Error(`TMDB ${r.status}`);
  return r.json();
}

// ── NAV SCROLL ──
window.addEventListener('scroll', () =>
  document.getElementById('nav').classList.toggle('scrolled', scrollY > 60));

// ── TABS ──
document.querySelectorAll('.nav-tab, .tab-btn').forEach(b => {
  b.addEventListener('click', () => {
    const type = b.dataset.type;
    currentType = type;
    document.querySelectorAll('.nav-tab, .tab-btn').forEach(x =>
      x.classList.toggle('active', x.dataset.type === type));
    clearSearch();
    loadSections(type);
  });
});

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { clearSearch(); return; }
  searchTimer = setTimeout(() => runSearch(q), 420);
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchSection').classList.remove('visible');
  document.getElementById('browseSection').classList.remove('hidden');
}

async function runSearch(q) {
  document.getElementById('searchSection').classList.add('visible');
  document.getElementById('browseSection').classList.add('hidden');
  document.getElementById('searchTitle').textContent = `Results for "${q}"`;
  const grid = document.getElementById('searchGrid');
  grid.innerHTML = '<div class="loading"><div class="spinner"></div> Searching…</div>';
  try {
    const [mv, tv] = await Promise.all([
      api('/search/movie', { query: q }),
      api('/search/tv',    { query: q })
    ]);
    const results = [
      ...mv.results.map(m => ({ ...m, media_type: 'movie' })),
      ...tv.results.map(s => ({ ...s, media_type: 'tv' }))
    ].filter(i => i.poster_path).sort((a, b) => b.popularity - a.popularity);
    grid.innerHTML = '';
    if (!results.length) { grid.innerHTML = '<p class="no-results">No results found.</p>'; return; }
    results.forEach(item => grid.appendChild(makeCard(item)));
  } catch (e) {
    grid.innerHTML = `<p class="error-msg">Search failed: ${e.message}</p>`;
  }
}

// ── HERO ──
async function loadHero() {
  try {
    const [mv, tv] = await Promise.all([
      api('/trending/movie/week'),
      api('/trending/tv/week')
    ]);
    heroItems = [
      ...mv.results.slice(0, 5).map(m => ({ ...m, media_type: 'movie' })),
      ...tv.results.slice(0, 3).map(s => ({ ...s, media_type: 'tv' }))
    ].filter(i => i.backdrop_path).slice(0, 7);
    buildDots();
    showHero(0);
    heroTimer = setInterval(() => showHero((heroIdx + 1) % heroItems.length), 7500);
  } catch (e) {
    document.getElementById('heroContent').innerHTML =
      `<p class="error-msg">Failed to load: ${e.message}</p>`;
  }
}

function buildDots() {
  const c = document.getElementById('heroDots');
  c.innerHTML = '';
  heroItems.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'hero-dot' + (i === 0 ? ' active' : '');
    d.onclick = () => { clearInterval(heroTimer); showHero(i); heroTimer = setInterval(() => showHero((heroIdx + 1) % heroItems.length), 7500); };
    c.appendChild(d);
  });
}

function showHero(idx) {
  heroIdx = idx;
  const it = heroItems[idx];
  document.getElementById('heroBg').style.backgroundImage = `url(${IMG}original${it.backdrop_path})`;
  const title    = it.title || it.name || 'Untitled';
  const rating   = it.vote_average ? it.vote_average.toFixed(1) : 'N/A';
  const year     = (it.release_date || it.first_air_date || '').slice(0, 4);
  const typeLabel = it.media_type === 'movie' ? 'Movie' : 'TV Series';
  document.getElementById('heroContent').innerHTML = `
    <div class="hero-badge">● ${typeLabel}</div>
    <h1 class="hero-title">${title}</h1>
    <div class="hero-meta">
      <span class="green">★ ${rating}</span>
      <span class="dot"></span>
      <span>${year}</span>
      <span class="dot"></span>
      <span>${Math.round(it.popularity).toLocaleString()} popularity</span>
    </div>
    <p class="hero-overview">${it.overview || ''}</p>
    <div class="hero-actions">
      <button class="btn-play" onclick="openModal(${it.id},'${it.media_type}')">▶ Watch Trailer</button>
      <button class="btn-info" onclick="openModal(${it.id},'${it.media_type}')">ℹ More Info</button>
    </div>`;
  document.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === idx));
}

// ── SECTIONS ──
async function loadSections(type) {
  const el = document.getElementById('sections');
  el.innerHTML = '<div class="loading"><div class="spinner"></div> Loading content…</div>';
  try {
    const calls = [];
    if (type !== 'tv') {
      calls.push(api('/trending/movie/week').then(d => ({ title: '🔥 Trending Movies',   items: d.results.map(m => ({ ...m, media_type: 'movie' })) })));
      calls.push(api('/movie/popular').then(d =>       ({ title: '🎬 Popular Movies',     items: d.results.map(m => ({ ...m, media_type: 'movie' })) })));
      calls.push(api('/movie/top_rated').then(d =>     ({ title: '⭐ Top Rated Movies',   items: d.results.map(m => ({ ...m, media_type: 'movie' })) })));
      calls.push(api('/movie/now_playing').then(d =>   ({ title: '🆕 Now In Cinemas',     items: d.results.map(m => ({ ...m, media_type: 'movie' })) })));
    }
    if (type !== 'movie') {
      calls.push(api('/trending/tv/week').then(d =>    ({ title: '📺 Trending TV Shows',  items: d.results.map(s => ({ ...s, media_type: 'tv' })) })));
      calls.push(api('/tv/popular').then(d =>          ({ title: '🌟 Popular TV Shows',   items: d.results.map(s => ({ ...s, media_type: 'tv' })) })));
      calls.push(api('/tv/top_rated').then(d =>        ({ title: '🏆 Top Rated TV Shows', items: d.results.map(s => ({ ...s, media_type: 'tv' })) })));
      calls.push(api('/tv/on_the_air').then(d =>       ({ title: '📡 Currently Airing',   items: d.results.map(s => ({ ...s, media_type: 'tv' })) })));
    }
    const secs = await Promise.all(calls);
    el.innerHTML = '';
    secs.forEach(sec => {
      const items = sec.items.filter(i => i.poster_path);
      if (items.length) el.appendChild(makeSection(sec.title, items));
    });
  } catch (e) {
    el.innerHTML = `<p class="error-msg">Failed to load content: ${e.message}<br>Make sure your API key is valid and not expired.</p>`;
  }
}

function makeSection(title, items) {
  const id  = 'r' + Math.random().toString(36).slice(2);
  const div = document.createElement('div');
  div.className = 'section';
  div.innerHTML = `
    <div class="section-title">${title}</div>
    <div class="row-wrap">
      <button class="row-arrow left" onclick="scrollRow('${id}',-1)">‹</button>
      <div class="row" id="${id}"></div>
      <button class="row-arrow right" onclick="scrollRow('${id}',1)">›</button>
    </div>`;
  const row = div.querySelector(`#${id}`);
  items.forEach(item => row.appendChild(makeCard(item)));
  return div;
}

function scrollRow(id, dir) {
  const r = document.getElementById(id);
  if (r) r.scrollBy({ left: dir * 520, behavior: 'smooth' });
}

function makeCard(item) {
  const title  = item.title || item.name || 'Untitled';
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
  const card   = document.createElement('div');
  card.className = 'card';
  const fallback = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='450'><rect fill='%231f1f1f' width='300' height='450'/><text x='150' y='225' text-anchor='middle' fill='%23555' font-size='13' font-family='sans-serif'>No Image</text></svg>`;
  card.innerHTML = `
    <img src="${IMG}w300${item.poster_path}" alt="${title}" loading="lazy" onerror="this.src='${fallback}'">
    <button class="card-play" title="Watch Trailer">▶</button>
    <div class="card-overlay">
      <div class="card-title">${title}</div>
      ${rating ? `<div class="card-rating">★ ${rating}</div>` : ''}
    </div>`;
  card.addEventListener('click', () => openModal(item.id, item.media_type));
  return card;
}

// ── MODAL ──
async function openModal(id, type) {
  const overlay = document.getElementById('modalOverlay');
  const videoEl = document.getElementById('modalVideo');
  const bodyEl  = document.getElementById('modalBody');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  videoEl.innerHTML = '<div class="no-trailer"><div class="spinner"></div></div>';
  bodyEl.innerHTML  = '';
  try {
    const [detail, vids] = await Promise.all([
      api(`/${type}/${id}`, { append_to_response: 'genres' }),
      api(`/${type}/${id}/videos`)
    ]);
    const key = pickTrailer(vids.results || []);
    videoEl.innerHTML = key
      ? `<iframe src="https://www.youtube.com/embed/${key}?autoplay=1&rel=0" allowfullscreen allow="autoplay; encrypted-media"></iframe>`
      : `<div class="no-trailer">${detail.backdrop_path ? `<img src="${IMG}w1280${detail.backdrop_path}" style="width:100%;height:100%;object-fit:cover;opacity:0.4">` : ''}<div class="icon">🎬</div><span>No trailer available</span></div>`;

    const title   = detail.title || detail.name || 'Untitled';
    const rating  = detail.vote_average ? detail.vote_average.toFixed(1) : 'N/A';
    const year    = (detail.release_date || detail.first_air_date || '').slice(0, 4);
    const runtime = detail.runtime ? `${detail.runtime} min` : (detail.episode_run_time?.[0] ? `~${detail.episode_run_time[0]} min/ep` : '');
    const seasons = detail.number_of_seasons ? `${detail.number_of_seasons} Season${detail.number_of_seasons > 1 ? 's' : ''}` : '';
    const genres  = (detail.genres || []).map(g => `<span class="genre-tag">${g.name}</span>`).join('');

    bodyEl.innerHTML = `
      <div class="modal-title">${title}</div>
      <div class="modal-meta">
        <span class="green">★ ${rating}</span>
        ${year     ? `<span class="pill">${year}</span>`    : ''}
        ${runtime  ? `<span class="pill">${runtime}</span>` : ''}
        ${seasons  ? `<span class="pill">${seasons}</span>` : ''}
        ${detail.status ? `<span class="pill">${detail.status}</span>` : ''}
      </div>
      <p class="modal-overview">${detail.overview || 'No description available.'}</p>
      ${genres ? `<div class="modal-genres">${genres}</div>` : ''}`;
  } catch (e) {
    videoEl.innerHTML = `<div class="no-trailer"><div class="icon">⚠️</div><span>Failed to load: ${e.message}</span></div>`;
  }
}

function pickTrailer(videos) {
  const yt = videos.filter(v => v.site === 'YouTube');
  const order = ['Official Trailer', 'Trailer', 'Teaser Trailer', 'Teaser', 'Clip'];
  for (const label of order) {
    const match = yt.find(v => v.name.includes(label));
    if (match) return match.key;
  }
  return yt[0]?.key ?? null;
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalVideo').innerHTML = '';
  document.body.style.overflow = '';
}

// ── INIT ──
loadHero();
loadSections('all');
</script>
